<div class="flex items-center gap-2 mb-8 text-on-surface-variant">
<button class="flex items-center gap-1 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="arrow_back">arrow_back</span>

<span class="text-outline-variant">/</span>

<div class="w-full h-[600px] bg-surface-container-low rounded-xl overflow-hidden relative shadow-sm">

</button>
</div>

<label class="font-label text-sm font-semibold text-on-surface-variant block">Zone Name</label>
<input class="w-full bg-surface-container-lowest border-none ring-1 ring-outline-variant focus:ring-2 focus:ring-primary rounded-lg px-4 py-3 text-on-surface font-medium transition-all" placeholder="Enter pasture name..." type="text" value="North Pasture"/>
</div>

<label class="font-label text-sm font-semibold text-on-surface-variant block">Zone Type</label>
<div class="grid grid-cols-2 gap-3">

</button>

<div class="flex justify-between text-[10px] font-black text-outline uppercase tracking-widest">

<span>2.5km</span>
</div>

</div>
<span class="text-sm font-medium text-on-surface-variant">Alert on Exit</span>
</label>
<label class="flex items-center gap-3 cursor-pointer group">
<div class="w-6 h-6 rounded-md bg-primary ring-1 ring-primary flex items-center justify-center transition-all">
<span class="material-symbols-outlined text-on-primary text-lg" data-icon="check">check</span>
</div>
<span class="text-sm font-medium text-on-surface-variant">Log Activity Duration</span>
</label>
</div>
