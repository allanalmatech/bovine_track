name: bovine_track
description: "Livestock tracking app"
publish_to: 'none' 
version: 1.0.0+1
environment:
  sdk: ">=3.7.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  permission_handler: ^11.3.1
  geolocator: ^13.0.2
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4
  connectivity_plus: ^6.1.0
  http: ^1.2.2
  firebase_core: ^3.6.0
  firebase_database: ^11.1.5
  firebase_auth: ^5.3.1
  cloud_functions: ^5.1.3
  firebase_messaging: ^15.1.3
  shared_preferences: ^2.3.2
  device_info_plus: ^10.1.2
  sensors_plus: ^6.1.0
  google_maps_flutter: ^2.9.0
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
flutter:
  uses-material-design: true